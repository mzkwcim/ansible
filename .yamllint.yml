---
extends: default

rules:
  document-start: disable

  comments:
    min-spaces-from-content: 1

  comments-indentation: false

  braces:
    max-spaces-inside: 1

  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true

  line-length:
    max: 136
    level: warning

  truthy:
    allowed-values: ["true", "false", "on", "off", "yes", "no"]
